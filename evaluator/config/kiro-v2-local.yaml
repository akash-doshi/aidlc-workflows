models:
  executor:
    provider: "bedrock"
    model_id: "global.anthropic.claude-opus-4-6-v1"
  simulator:
    provider: "bedrock"
    model_id: "global.anthropic.claude-opus-4-6-v1"

aidlc:
  rules_source: "local"
  # Relative paths resolve against the git root (the evaluator's parent dir).
  # The unified v2 layout ships harness distributions under dist/; the runner
  # copies the <rules_local_path>/src tree, so point at a dist that carries it.
  # NOTE: opt-in dev config (not on the default/CLI-adapter path); validate the
  # source layout before relying on it after the v2 "one core, many harnesses"
  # restructure.
  rules_local_path: "dist/kiro-ide/.kiro"
  rules_ref: "local"
  rules_version: "v2"

runs:
  output_dir: "./runs"

execution:
  enabled: true
  command_timeout: 120
  post_run_tests: true
  post_run_timeout: 300
  sandbox:
    enabled: false

swarm:
  max_handoffs: 500
  max_iterations: 500
  execution_timeout: 21600
  node_timeout: 3600
